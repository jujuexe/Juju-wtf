<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-size='80' fill='white' transform='rotate(180 50 50)'>✝</text></svg>">
    <meta property="og:image" content="https://github.com/jujuexe/Juju-wtf/blob/main/juxvv-avatar.png?raw=true">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>♡ juju.wtf</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box}
        :root{
            --b:#ff4da3;
            --glow:#ff99cc;
            --bg:#05070c;
        }
        body{
            margin:0;
            background:var(--bg);
            color:#fff;
            font-family:Inter,sans-serif;
            height:100vh;
            overflow:hidden;
        }
        #background-video{
            position:fixed;
            inset:0;
            width:100vw;
            height:100vh;
            object-fit:cover;
            z-index:-1;
            opacity:0;
            transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1);
        }
        body.playing #background-video{opacity:1}
        .intro-screen{
            position:fixed;
            inset:0;
            background:#000;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            font-size:1.8rem;
            cursor:pointer;
            z-index:200;
            transition:all 0.6s cubic-bezier(0.4,0,0.2,1);
        }
        .intro-screen img{
            width:110px;
            height:110px;
            border-radius:50%;
            margin-bottom:28px;
            box-shadow:0 0 45px var(--b);
        }
        .intro-screen .enter-text{
            font-size:2.1rem;
            letter-spacing:0.08rem;
            animation: promptPulse 1.8s ease-in-out infinite;
            text-shadow:0 0 20px var(--glow), 0 0 40px var(--b);
        }
        .intro-screen.fade{
            opacity:0;
            transform:scale(1.08);
            pointer-events:none;
        }
        .container{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%) scale(0.92);
            text-align:center;
            display:flex;
            flex-direction:column;
            align-items:center;
            opacity:0;
            transition:all 1s cubic-bezier(0.4,0,0.2,1);
        }
        body.playing .container{
            opacity:1;
            transform:translate(-50%,-50%) scale(1);
        }
        .pfp{
            width:128px;
            height:128px;
            border-radius:50%;
            margin-bottom:24px;
            box-shadow:
                0 0 30px var(--b),
                0 0 70px rgba(255,77,163,0.7),
                inset 0 0 20px rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }
        .pfp:hover{
            transform: scale(1.08) rotate(4deg);
            box-shadow:
                0 0 55px var(--glow),
                0 0 100px rgba(255,153,204,0.8);
        }
        .title{
            font-size:2.4rem;
            letter-spacing:0.15rem;
            text-shadow:
                0 0 12px var(--b),
                0 0 35px var(--b),
                0 0 60px rgba(255,77,163,0.6);
            transition: all 0.3s ease;
        }
        .title:hover{
            text-shadow:
                0 0 25px #fff,
                0 0 50px var(--glow),
                0 0 80px var(--glow);
            animation: glitch 0.35s linear infinite alternate;
        }
        @keyframes glitch{
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .bounce{
            animation: bounce 2.2s ease-in-out infinite;
        }
        @keyframes bounce{
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-7px)}
        }
        @keyframes promptPulse{
            0%,100%{opacity:0.7; transform:scale(0.95);}
            50%{opacity:1; transform:scale(1.05);}
        }
        .social-wrapper{
            margin-top:38px;
            display:flex;
            gap:28px;
            justify-content:center;
            align-items:center;
        }
        .social-icon{
            width:52px;
            height:52px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            position:relative;
            transition: all 0.3s ease;
        }
        .social-icon svg,
        .social-icon img{
            width:44px;
            height:44px;
            object-fit:contain;
            filter: drop-shadow(0 0 12px rgba(255,77,163,0.9)) drop-shadow(0 0 30px rgba(255,77,163,0.6));
            transition: all 0.3s ease;
        }
        .social-icon:hover svg,
        .social-icon:hover img{
            transform: scale(1.2) rotate(10deg);
            filter: drop-shadow(0 0 20px #ff99cc) drop-shadow(0 0 45px #ff99cc);
        }
        .social-tooltip{
            position:absolute;
            top:-48px;
            background:rgba(0,0,0,0.92);
            color:#ff99cc;
            font-size:12.5px;
            padding:7px 14px;
            border-radius:8px;
            white-space:nowrap;
            opacity:0;
            pointer-events:none;
            transition:all 0.25s ease;
            box-shadow:0 0 15px rgba(255,77,163,0.5);
        }
        .social-icon:hover .social-tooltip{
            opacity:1;
            transform:translateY(-4px);
        }
        #audio-controls{
            position:absolute;
            bottom:28px;
            left:50%;
            transform:translateX(-50%) translateY(25px);
            background:rgba(5,7,12,0.75);
            padding:14px 22px;
            border-radius:16px;
            box-shadow:0 0 40px var(--b);
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:10px;
            opacity:0;
            transition:all 1s cubic-bezier(0.4,0,0.2,1);
            border:1px solid rgba(255,77,163,0.3);
        }
        body.playing #audio-controls{
            opacity:1;
            transform:translateX(-50%) translateY(0);
        }
        .now-playing{
            font-size:0.95rem;
            text-shadow:0 0 15px var(--b);
        }
        #pause-button{
            background:rgba(255,77,163,0.12);
            border:1px solid rgba(255,77,163,0.6);
            color:#fff;
            font-family:inherit;
            font-size:1rem;
            padding:8px 20px;
            border-radius:10px;
            cursor:pointer;
            box-shadow:0 0 20px var(--b);
            transition:all 0.3s ease;
        }
        #pause-button:hover{
            background:rgba(255,77,163,0.35);
            box-shadow:0 0 30px var(--glow);
        }
        .shoot{
            position:fixed;
            width:2px;
            height:22px;
            background:linear-gradient(to top, transparent, var(--glow));
            pointer-events:none;
            filter:drop-shadow(0 0 8px var(--b));
            animation:shoot 0.6s linear forwards;
            z-index:9999;
        }
        @keyframes shoot{
            to{
                opacity:0;
                transform:translate(var(--dx), var(--dy));
            }
        }
    </style>
</head>
<body>
    <div class="intro-screen" id="intro">
        <img src="https://github.com/jujuexe/Juju-wtf/blob/main/juxvv-avatar.png?raw=true" alt="juju">
        <div class="enter-text bounce">click to enter ♡</div>
    </div>
    <video id="background-video" loop playsinline>
        <source src="https://github.com/jujuexe/Juju-wtf/raw/refs/heads/main/Freestyle%20(1).mp4" type="video/mp4">
    </video>
    <div class="container">
        <img class="pfp" src="https://github.com/jujuexe/Juju-wtf/blob/main/juxvv-avatar.png?raw=true" alt="juju pfp">
        <div class="title bounce">JuJu.wtf</div>
       
        <div class="social-wrapper">
           
            <div class="social-icon">
                <div class="social-tooltip">add juxvv on discord</div>
                <a href="https://discord.com/users/125800817457364992" target="_blank" rel="noopener">
                    <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg" fill="#ffffff">
                        <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.22 0A72.37 72.37 0 0 0 45.53 0a105.89 105.89 0 0 0-26.27 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.35 2.66-2.06 20.87 9.78 43.55 9.78 64.17 0 .87.71 1.76 1.4 2.66 2.06a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1A105.25 105.25 0 0 0 126.6 80.2c2.64-27.57-4.53-51.3-18.9-72.13ZM42.45 65.69c-6.28 0-11.45-5.75-11.45-12.8 0-7.06 5.1-12.81 11.45-12.81s11.48 5.75 11.45 12.81c0 7.05-5.1 12.8-11.45 12.8Zm42.24 0c-6.28 0-11.45-5.75-11.45-12.8 0-7.06 5.1-12.81 11.45-12.81s11.48 5.75 11.45 12.81c0 7.05-5.1 12.8-11.45 12.8Z"/>
                    </svg>
                </a>
            </div>
            
            <div class="social-icon">
                <div class="social-tooltip">view my statshark</div>
                <a href="https://statshark.net/player/201846484" target="_blank" rel="noopener">
                    <img src="https://github.com/jujuexe/Juju-wtf/blob/main/statshark%20blackj%20white.png?raw=true" alt="statshark">
                </a>
            </div>
        </div>
    </div>
    <div id="audio-controls">
        <div class="now-playing" id="now-playing">Now Playing: Freestyle</div>
        <button id="pause-button">Pause ⏯</button>
    </div>
    <script>
        const video = document.getElementById('background-video')
        const intro = document.getElementById('intro')
        const pauseBtn = document.getElementById('pause-button')
        const nowPlaying = document.getElementById('now-playing')
       
        let isPaused = false
        intro.onclick = () => {
            intro.classList.add('fade')
            document.body.classList.add('playing')
            video.play()
        }
        pauseBtn.onclick = () => {
            if (isPaused) {
                video.play()
                pauseBtn.textContent = 'Pause ⏯'
                nowPlaying.textContent = 'Now Playing: Freestyle'
            } else {
                video.pause()
                pauseBtn.textContent = 'Play ⏯'
                nowPlaying.textContent = 'Paused'
            }
            isPaused = !isPaused
        }
        document.addEventListener('mousemove', e => {
            for (let i = 0; i < 2; i++) {
                const shoot = document.createElement('div')
                shoot.className = 'shoot'
                shoot.style.left = e.clientX + 'px'
                shoot.style.top = e.clientY + 'px'
                shoot.style.setProperty('--dx', (Math.random() * 80 - 40) + 'px')
                shoot.style.setProperty('--dy', (-Math.random() * 110 - 20) + 'px')
                if (Math.random() > 0.7) shoot.style.background = 'linear-gradient(to top, transparent, #ff99cc)'
                document.body.appendChild(shoot)
                setTimeout(() => shoot.remove(), 650)
            }
        })
    </script>
</body>
</html>
